x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://culturalbridge:${DB_PASSWORD:-culturalbridge}@postgres:5432/culturalbridge
  REDIS_URL: redis://redis:6379/0
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
  BAILIAN_API_KEY: ${BAILIAN_API_KEY}
  BAILIAN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
  BAILIAN_MODEL_PLUS: qwen-plus
  BAILIAN_MODEL_MAX: qwen-max
  MCA_FILE_STORE_DIR: /app/uploads
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
  RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
    networks:
      - app
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  backend:
    build: ./backend
    networks:
      - app
      - data
    environment:
      <<: *backend-env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app worker -l info -c 4
    networks:
      - data
    environment:
      <<: *backend-env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app", "inspect", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    networks:
      - data
    environment:
      POSTGRES_DB: culturalbridge
      POSTGRES_USER: culturalbridge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-culturalbridge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U culturalbridge -d culturalbridge"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    networks:
      - data
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  app:
  data:

volumes:
  pgdata:
  redisdata:
  uploads:
