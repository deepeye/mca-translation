server {
    listen 80;
    server_name localhost;
    client_max_body_size 10m;

    # 容器内部健康检查(不带 /mca)
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # WS:strip /mca
    location /mca/api/ws/ {
        proxy_pass http://backend:8000/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 后端 API:strip /mca
    location /mca/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 外部健康检查
    location = /mca/health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # 前端:保留 /mca(Next.js basePath 需要完整路径)
    location /mca/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /mca(无尾斜杠)代理给前端:Next.js basePath=/mca 会把 /mca 重定向到 /mca/workspace。
    # 不能 301 → /mca/,否则与 Next.js 的 /mca/ → 308 → /mca 形成重定向环。
    location = /mca {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 根路径重定向到应用前缀(LAN 直连 :8082/ 也能用)
    location = / { return 301 /mca/; }
}
